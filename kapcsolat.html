<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kapcsolat | NEXUS Webstúdió</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="images/favicon.png">

    <!-- Preload Self-Hosted Outfit Font -->
    <link rel="preload" href="fonts/Outfit-Variable.woff2" as="font" type="font/woff2" crossorigin>

    <!-- Stylesheet -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <!-- HÁTTÉR SZÍNFOLTOK A FROST EFFECTHEZ -->
    <div class="ambient-glow-1"></div>
    <div class="ambient-glow-2"></div>

    <!-- NAVBAR -->
    <header>
        <div class="nav-inner">
            <a href="index.html" class="logo">
                <span class="logo-badge">NEXUS</span> WEB
            </a>
            <ul class="nav-links">
                <li><a href="index.html">Kezdőlap</a></li>
                <li><a href="araink.html">Áraink</a></li>
                <li><a href="kapcsolat.html" class="active">Kapcsolat</a></li>
            </ul>
            <a href="kapcsolat.html" class="btn btn-primary" style="padding: 8px 18px; font-size: 0.85rem;">Ajánlatkérés</a>
        </div>
    </header>

    <section class="hero">
        <div class="container">
            <span class="mono-tag">Lépjen Velünk Kapcsolatba</span>
            <h1>Indítsuk El Új Weboldalát</h1>
            <p>Töltse ki az alábbi űrlapot, és 24 órán belül felvesszük Önnel a kapcsolatot egy ingyenes konzultációra.</p>
        </div>
    </section>

    <!-- CONTACT FORM -->
    <section class="section">
        <div class="container" style="max-width: 600px;">
            <div class="glass-panel" style="padding: 40px;">
                
                <form action="https://api.web3forms.com/submit" method="POST">
                    
                    <!-- Web3Forms Key (Replace with your key) -->
                    <input type="hidden" name="access_key" value="YOUR_WEB3FORMS_KEY_HERE">
                    <input type="hidden" name="subject" value="Új ajánlatkérés a NEXUS Webstúdió oldalról">

                    <div style="margin-bottom: 24px;">
                        <label>Név</label>
                        <input type="text" name="name" placeholder="Az Ön neve" required style="width: 100%;">
                    </div>

                    <div style="margin-bottom: 24px;">
                        <label>Email cím</label>
                        <input type="email" name="email" placeholder="email@domain.hu" required style="width: 100%;">
                    </div>

                    <div style="margin-bottom: 28px;">
                        <label>Projekt részletei / Üzenet</label>
                        <textarea name="message" rows="5" placeholder="Milyen weboldalra lenne szüksége?" style="width: 100%;"></textarea>
                    </div>

                    <button type="submit" class="btn btn-primary" style="width: 100%; font-size: 1.05rem; padding: 14px;">Üzenet Küldése →</button>
                </form>

            </div>
        </div>
    </section>

    <footer>
        <div class="container">
            <p>© 2026 NEXUS Webstúdió. Minden jog fenntartva.</p>
        </div>
    </footer>

</body>
</html>
