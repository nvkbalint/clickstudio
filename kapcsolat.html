<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kapcsolat | CodeStudio</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="images/favicon.png">

    <!-- GOOGLE CDN OUTFIT FONT -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">

    <!-- STYLESHEET -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <div class="ambient-glow-1"></div>
    <div class="ambient-glow-2"></div>

    <!-- NAVBAR -->
    <header>
        <div class="nav-inner">
            <a href="index.html" class="logo">
                <span class="logo-badge">CODE</span> STUDIO
            </a>
            <ul class="nav-links">
                <li><a href="index.html">Kezdőlap</a></li>
                <li><a href="wordpress.html">WordPress</a></li>
                <li><a href="araink.html">Áraink</a></li>
                <li><a href="kapcsolat.html" class="active">Kapcsolat</a></li>
            </ul>
            <a href="kapcsolat.html" class="btn btn-primary" style="padding: 8px 18px; font-size: 0.85rem;">Ajánlatkérés</a>
        </div>
    </header>

    <!-- HERO SECTION -->
    <section class="hero" style="padding-top: 180px; padding-bottom: 20px;">
        <div class="container">
            <span class="mono-tag">Lépj velünk kapcsolatba</span>
            <h1>Indítsuk el az új weboldaladat</h1>
            <p>Töltsd ki az alábbi űrlapot, és 24 órán belül felvesszük veled a kapcsolatot egy ingyenes konzultációra.</p>
        </div>
    </section>

    <!-- CONTACT FORM -->
    <section class="section" style="padding-top: 20px;">
        <div class="container" style="max-width: 580px;">
            <div class="glass-panel" style="padding: 48px 40px;">
                
                <form action="https://api.web3forms.com/submit" method="POST">
                    <!-- Web3Forms Access Key -->
                    <input type="hidden" name="access_key" value="23efb807-b8fc-4566-b5e0-0a1b36a09f5e">
                    <input type="hidden" name="subject" value="Új ajánlatkérés a CodeStudio oldalról">

                    <!-- DROPDOWN (E-mail kompatibilis nevekkel) -->
                    <div class="form-group">
                        <label for="package">Választott szolgáltatás</label>
                        <select id="package" name="Valasztott_szolgaltatas" required>
                            <option value="" disabled selected hidden>Válassz szolgáltatást...</option>
                            <option value="Start weboldal csomag">Start weboldal csomag</option>
                            <option value="Pro weboldal csomag">Pro weboldal csomag</option>
                            <option value="Egyedi weboldal csomag">Egyedi weboldal csomag</option>
                            <option value="Egyedi WordPress szolgáltatás">Egyedi WordPress szolgáltatás</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="name">Név</label>
                        <input type="text" id="name" name="Nev" placeholder="A neved" required>
                    </div>

                    <div class="form-group">
                        <label for="email">Email cím</label>
                        <input type="email" id="email" name="email" placeholder="email@domain.hu" required>
                    </div>

                    <div class="form-group">
                        <label for="message">Projekt részletei</label>
                        <textarea id="message" name="Projekt_reszletei" placeholder="Milyen weboldalra lenne szükséged?"></textarea>
                    </div>

                    <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 8px;">Üzenet küldése →</button>
                </form>

            </div>
        </div>
    </section>

    <footer>
        <div class="container">
            <p>© 2026 CodeStudio. Minden jog fenntartva.</p>
        </div>
    </footer>

    <!-- JS FÁJL -->
    <script src="js/script.js"></script>

</body>
</html>
