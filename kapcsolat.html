<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kapcsolat | NEXUS Webstúdió</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="images/favicon.png">

    <!-- Preload Self-Hosted Outfit Font -->
    <link rel="preload" href="fonts/Outfit-Variable.woff2" as="font" type="font/woff2" crossorigin>

    <!-- Stylesheet -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <!-- HÁTTÉR SZÍNFOLTOK A FROST EFFECTHEZ -->
    <div class="ambient-glow-1"></div>
    <div class="ambient-glow-2"></div>

    <!-- NAVBAR -->
    <header>
        <div class="nav-inner">
            <a href="index.html" class="logo">
                <span class="logo-badge">NEXUS</span> WEB
            </a>
            <ul class="nav-links">
                <li><a href="index.html">Kezdőlap</a></li>
                <li><a href="araink.html">Áraink</a></li>
                <li><a href="kapcsolat.html" class="active">Kapcsolat</a></li>
            </ul>
            <a href="kapcsolat.html" class="btn btn-primary" style="padding: 8px 18px; font-size: 0.85rem;">Ajánlatkérés</a>
        </div>
    </header>

    <section class="section">
    <div class="container" style="max-width: 580px;">
        <div class="glass-panel" style="padding: 48px 40px;">
            
            <form action="https://api.web3forms.com/submit" method="POST">
                <input type="hidden" name="access_key" value="YOUR_WEB3FORMS_KEY_HERE">
                <input type="hidden" name="subject" value="Új ajánlatkérés a NEXUS Webstúdió oldalról">

                <div class="form-group">
                    <label for="name">Név</label>
                    <input type="text" id="name" name="name" placeholder="Az Ön neve" required>
                </div>

                <div class="form-group">
                    <label for="email">Email cím</label>
                    <input type="email" id="email" name="email" placeholder="email@domain.hu" required>
                </div>

                <div class="form-group">
                    <label for="message">Projekt részletei / Üzenet</label>
                    <textarea id="message" name="message" placeholder="Milyen weboldalra lenne szüksége?"></textarea>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 8px;">Üzenet Küldése →</button>
            </form>

        </div>
    </div>
</section>

    <footer>
        <div class="container">
            <p>© 2026 NEXUS Webstúdió. Minden jog fenntartva.</p>
        </div>
    </footer>

</body>
</html>
