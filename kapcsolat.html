<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kapcsolat | NEXUS Webstúdió</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="images/favicon.png">

    <!-- GOOGLE CDN OUTFIT FONT -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">

    <!-- STYLESHEET -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <div class="ambient-glow-1"></div>
    <div class="ambient-glow-2"></div>

    <!-- NAVBAR -->
    <header>
        <div class="nav-inner">
            <a href="index.html" class="logo">
                <span class="logo-badge">NEXUS</span> WEB
            </a>
            <ul class="nav-links">
                <li><a href="index.html">Kezdőlap</a></li>
                <li><a href="araink.html">Áraink</a></li>
                <li><a href="kapcsolat.html" class="active">Kapcsolat</a></li>
            </ul>
            <a href="kapcsolat.html" class="btn btn-primary" style="padding: 8px 18px; font-size: 0.85rem;">Ajánlatkérés</a>
        </div>
    </header>

    <section class="hero">
        <div class="container">
            <span class="mono-tag">Lépj Velünk Kapcsolatba</span>
            <h1>Indítsuk el új weboldaladat</h1>
            <p>Töltsd ki az alábbi űrlapot, és 24 órán belül felvesszük veled a kapcsolatot egy ingyenes konzultációra.</p>
        </div>
    </section>

    <!-- CONTACT FORM -->
    <section class="section" style="padding-top: 20px;">
        <div class="container" style="max-width: 580px;">
            <div class="glass-panel" style="padding: 48px 40px;">
                
                <form action="https://api.web3forms.com/submit" method="POST">
                    <input type="hidden" name="access_key" value="YOUR_WEB3FORMS_KEY_HERE">
                    <input type="hidden" name="subject" value="Új ajánlatkérés a NEXUS Webstúdió oldalról">

                    <div class="form-group">
                        <label for="name">Név</label>
                        <input type="text" id="name" name="name" placeholder="A neved" required>
                    </div>

                    <div class="form-group">
                        <label for="email">Email cím</label>
                        <input type="email" id="email" name="email" placeholder="email@domain.hu" required>
                    </div>

                    <div class="form-group">
                        <label for="message">Projekt részletei</label>
                        <textarea id="message" name="message" placeholder="Milyen weboldalra lenne szükséged?"></textarea>
                    </div>

                    <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 8px;">Üzenet küldése →</button>
                </form>

            </div>
        </div>
    </section>

    <footer>
        <div class="container">
            <p>© 2026 NEXUS Webstúdió. Minden jog fenntartva.</p>
        </div>
    </footer>

</body>
</html>
